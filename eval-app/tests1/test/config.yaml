defaultTest:
  options:
    provider:
      embedding:
        id: openai:embedding:text-embedding-ada-002
description: test
prompts:
  - What are the primary mechanisms of toxicity for {chemname} or its synonyms with
    CAS number {casrn} in human? Please describe the molecular and cellular processes
    involved in its toxic effects.
  - 'Evaluate the potential biological effects of {chemname} or its synonyms with
    CAS number {casrn} on the following organ systems in human: integumentary, skeletal,
    muscular, nervous, and endocrine. Provide specific impacts where known.'
  - Assess the potential biological effects of {chemname} or its synonyms with CAS
    number {casrn} on the cardiovascular, lymphatic, respiratory, digestive, and
    urinary systems in human. Describe any known or predicted impacts.
  - Analyze the potential biological effects of {chemname} or its synonyms with
    CAS number {casrn} on the reproductive and immune systems in human. Include
    any known or suspected impacts on fertility, fetal development, and immune function.
  - Describe the absorption characteristics of {chemname} or its synonyms with CAS
    number {casrn} in human. Include information on potential routes of exposure,
    rate of absorption, and extent of absorption for each route.
providers:
  - config:
      temperature: 0
    id: openai:chat:azure-gpt-4o
    label: GPT-4o
  - config:
      temperature: 0
    id: openai:chat:claude-3-5-sonnet
    label: Claude 3.5 Sonnet
system_prompt: "You are an expert toxicologist with extensive knowledge in chemical\
  \ safety assessment, toxicokinetics, and toxicodynamics. Your expertise includes:\n\
  \n            1. Interpreting chemical structures and properties\n            2.\
  \ Analyzing toxicological data from various sources (e.g., in vitro, in vivo, and\
  \ in silico studies)\n            3. Applying read-across and QSAR (Quantitative\
  \ Structure-Activity Relationship) approaches\n            4. Understanding mechanisms\
  \ of toxicity and adverse outcome pathways\n            5. Evaluating systemic availability\
  \ based on ADME (Absorption, Distribution, Metabolism, Excretion) properties\n \
  \           6. Assessing potential health hazards and risks associated with chemical\
  \ exposure\n\n            When providing toxicological evaluations:\n          \
  \  - Use reliable scientific sources and databases (e.g., PubChem, ECHA, EPA, IARC)\n\
  \            - Consider both experimental data and predictive models\n         \
  \   - Explain your reasoning and cite relevant studies or guidelines\n         \
  \   - Acknowledge uncertainties and data gaps\n            - Provide a balanced\
  \ assessment, considering both potential hazards and mitigating factors\n      \
  \      - Use a weight-of-evidence approach when multiple data sources are available\n\
  \            - Classify toxicodynamic activity and systemic availability as high,\
  \ medium, or low based on \n            the available evidence and expert judgment\n\
  \            - When using read-across, clearly state the basis for the analogy and\
  \ any limitations\n\n            Adhere to ethical standards in toxicology and maintain\
  \ scientific objectivity in your assessments.\n            "
tests:
  - assert:
      - expected_phrases:
          - test
        type: python
        value: file://scripts/tests.py
    vars:
      casrn: 50-78-2
      chemname: Aspirin
