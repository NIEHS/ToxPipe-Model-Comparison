    to an adult rat for 28 days where dose is repeated each day by the oral route.
    Describe all organs that will be affected and the associated toxicological pathology
    that is observed. or any effects that are identified provide a mechanistic explanation
    for its occurrence, i.e., why and how did the chemical causes the toxicity. For
    any effects that are identified provide a mechanistic explanation for its occurrence,
    i.e., why and how did the chemical causes the toxicity. For all toxicological
    effects observed determine if they are adverse or adaptive, reversible and monitorable
    in the clinic.
