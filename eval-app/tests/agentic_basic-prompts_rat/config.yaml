  - Describe the known of predicted developmental toxicological effects (if any) of
    administering a maximum tolerated dose of {chemical_and_CASRN} to a pregnant female
    where the dose is repeated each day by the oral route during gestation. Describe
    all developmental and teratogenenic effects. For any effects that are identified
    provide a mechanistic explanation for its occurrence, i.e., why and how did the
    chemical causes the toxicity. For all toxicological effects observed determine
    if they are adverse or adaptive, reversible and monitorable in the clinic
  - Provide the key pharmacokinetic parameters in rats for the oral administration
    of {chemical_and_CASRN}. Address its absorption, including maximum serum concentration
    (Cmax), time to reach maximum concentration (Tmax), area under the curve (AUC),
    and bioavailability (F). Additionally, information on its distribution, such as
    volume of distribution (V\(_d\)) and plasma protein binding, would be helpful.
    For metabolism, please detail the half-life (t1/2), clearance rate (CL), and involved
    metabolic pathways, especially any liver enzyme interactions. Finally, regarding
    excretion, I need details on renal clearance, fecal excretion, and biliary excretion.
    Also, if available, please provide information on the time to steady state and
    accumulation index to assess potential drug accumulation upon repeated dosing
  - Identify a dose of {chemical_and_CASRN} that if administered every day for 28
    days to a group of 100 adult rats would have no significant toxicological effects
  - Identify a dose of {chemical_and_CASRN} that if administered chronically (lifetime)
    to a group of 100 adult rats would have no significant toxicological effects
  - Identify a dose that of {chemical_and_CASRN} that if administered to a group of
    100 pregnant rats throughout gestation would have no significant developmental
    or teratogenic effects on the developing fetuses
providers:
  - config:
      max_iterations: 10
      model: azure-gpt-4o
      summarize: 'false'
      temp: 0
    id: agentic
    label: Toxipe (Agentic) [GPT-4o]
  - config:
      max_iterations: 10
      model: claude-3-5-sonnet
      summarize: 'false'
      temp: 0
