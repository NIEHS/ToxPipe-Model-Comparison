description: Tests on agentic framework with basic-prompts prompts for rat
prompts:
  - What are the primary mechanisms of toxicity for {chemical_and_CASRN} in rat? Please
    describe the molecular and cellular processes involved in its toxic effects.
  - 'Evaluate the potential biological effects of {chemical_and_CASRN} on the following
    organ systems in rat: integumentary, skeletal, muscular, nervous, and endocrine.
    Provide specific impacts where known.'
  - Assess the potential biological effects of {chemical_and_CASRN} on the cardiovascular,
    lymphatic, respiratory, digestive, and urinary systems in rat. Describe any known
    or predicted impacts.
  - Analyze the potential biological effects of {chemical_and_CASRN} on the reproductive
    and immune systems in rat. Include any known or suspected impacts on fertility,
    fetal development, and immune function.
  - Describe the absorption characteristics of {chemical_and_CASRN} in rat. Include
    information on potential routes of exposure, rate of absorption, and extent of
    absorption for each route.
  - Evaluate the distribution patterns of {chemical_and_CASRN} in rat body. Include
    information on volume of distribution, tissue distribution, ability to cross the
    blood-brain barrier, and potential for placental transfer.
  - Describe the metabolism of {chemical_and_CASRN} in rat. Include information on
    phase I and II reactions, known or predicted metabolite profiles, and any specific
    enzymes involved in its biotransformation.
  - Analyze the excretion of {chemical_and_CASRN} in rat. Describe the primary routes
    of excretion and the rate at which the compound is eliminated from the body.
  - Assess the bioaccumulation potential of {chemical_and_CASRN} in rat. Discuss its
    potential for accumulation in tissues and its persistence in the body.
  - Provide information on the half-life of {chemical_and_CASRN} in rat. Include biological
    half-life, effective half-life, and environmental half-life where applicable.
  - Describe the known or predicted toxicological effects (if any) of administering
    a maximum tolerated dose of {chemical_and_CASRN} to an adult rat for 28 days where
    dose is repeated each day by the oral route. Describe all organs that will be
    affected and the associated toxicological pathology that is observed. or any effects
    that are identified provide a mechanistic explanation for its occurrence, i.e.,
    why and how did the chemical causes the toxicity. For any effects that are identified
    provide a mechanistic explanation for its occurrence, i.e., why and how did the
    chemical causes the toxicity. For all toxicological effects observed determine
    if they are adverse or adaptive, reversible and monitorable in the clinic
  - Describe the known or predicted toxicological effects (if any) on the immune system
    of administering a maximum tolerated dose of {chemical_and_CASRN} to an adult
    rat for 28 days where the dose is repeated each day by the oral route. Describe
    all functional effects and any associated toxicological histopathology or clinical
    pathology that are observed. or any effects that are identified provide a mechanistic
    explanation for its occurrence, i.e., why and how did the chemical causes the
    toxicity. For all toxicological effects observed determine if they are adverse
    or adaptive, reversible and monitorable in the clinic
  - Describe the known or predicted toxicological effects (if any) on the neurological
