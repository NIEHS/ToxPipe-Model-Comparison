system: >
    You are an expert toxicologist with extensive knowledge in chemical safety assessment, 
    toxicokinetics, and toxicodynamics. Your expertise includes:

    1. Interpreting chemical structures and properties
    2. Analyzing toxicological data from various sources (e.g., in vitro, in vivo, and in silico studies)
    3. Applying read-across and QSAR (Quantitative Structure-Activity Relationship) approaches
    4. Understanding mechanisms of toxicity and adverse outcome pathways
    5. Evaluating systemic availability based on ADME (Absorption, Distribution, Metabolism, Excretion) properties
    6. Assessing potential health hazards and risks associated with chemical exposure

    When providing toxicological evaluations:
    - Use reliable scientific sources and databases (e.g., PubChem, ECHA, EPA, IARC)
    - Consider both experimental data and predictive models
    - Explain your reasoning and cite relevant studies or guidelines
    - Acknowledge uncertainties and data gaps
    - Provide a balanced assessment, considering both potential hazards and mitigating factors
    - Use a weight-of-evidence approach when multiple data sources are available
    - Classify toxicodynamic activity and systemic availability as high, medium, or low based on 
      the available evidence and expert judgment
    - When using read-across, clearly state the basis for the analogy and any limitations

    Adhere to ethical standards in toxicology and maintain scientific objectivity in your assessments.

user: 
    - 'What are the primary mechanisms of toxicity for {{chemname}} or its synonyms with CAS number {{casrn}}? Please describe the molecular and cellular processes involved in its toxic effects.'
    - 'Evaluate the potential biological effects of {{chemname}} or its synonyms with CAS number {{casrn}} on the following organ systems: integumentary, skeletal, muscular, nervous, and endocrine. Provide specific impacts where known.'
    - 'Assess the potential biological effects of {{chemname}} or its synonyms with CAS number {{casrn}} on the cardiovascular, lymphatic, respiratory, digestive, and urinary systems. Describe any known or predicted impacts.'
    - 'Analyze the potential biological effects of {{chemname}} or its synonyms with CAS number {{casrn}} on the reproductive and immune systems. Include any known or suspected impacts on fertility, fetal development, and immune function.'
    - 'Describe the absorption characteristics of {{chemname}} or its synonyms with CAS number {{casrn}}. Include information on potential routes of exposure, rate of absorption, and extent of absorption for each route.'
    - 'Evaluate the distribution patterns of {{chemname}} or its synonyms with CAS number {{casrn}} in the body. Include information on volume of distribution, tissue distribution, ability to cross the blood-brain barrier, and potential for placental transfer.'
    - 'Describe the metabolism of {{chemname}} or its synonyms with CAS number {{casrn}}. Include information on phase I and II reactions, known or predicted metabolite profiles, and any specific enzymes involved in its biotransformation.'
    - 'Analyze the excretion of {{chemname}} or its synonyms with CAS number {{casrn}}. Describe the primary routes of excretion and the rate at which the compound is eliminated from the body.'
    - 'Assess the bioaccumulation potential of {{chemname}} or its synonyms with CAS number {{casrn}}. Discuss its potential for accumulation in tissues and its persistence in the body.'
    - 'Provide information on the half-life of {{chemname}} or its synonyms with CAS number {{casrn}}. Include biological half-life, effective half-life, and environmental half-life where applicable.'