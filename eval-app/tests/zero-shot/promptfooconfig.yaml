description: zero-shot test
prompts:
  - What are the primary mechanisms of toxicity for {{chemname}} or its synonyms with
    CAS number {{casrn}}? Please describe the molecular and cellular processes involved
    in its toxic effects.
  - 'Evaluate the potential biological effects of {{chemname}} or its synonyms with
    CAS number {{casrn}} on the following organ systems: integumentary, skeletal,
    muscular, nervous, and endocrine. Provide specific impacts where known.'
  - Assess the potential biological effects of {{chemname}} or its synonyms with CAS
    number {{casrn}} on the cardiovascular, lymphatic, respiratory, digestive, and
    urinary systems. Describe any known or predicted impacts.
  - Analyze the potential biological effects of {{chemname}} or its synonyms with
    CAS number {{casrn}} on the reproductive and immune systems. Include any known
    or suspected impacts on fertility, fetal development, and immune function.
  - Describe the absorption characteristics of {{chemname}} or its synonyms with CAS
    number {{casrn}}. Include information on potential routes of exposure, rate of
    absorption, and extent of absorption for each route.
  - Evaluate the distribution patterns of {{chemname}} or its synonyms with CAS number
    {{casrn}} in the body. Include information on volume of distribution, tissue distribution,
    ability to cross the blood-brain barrier, and potential for placental transfer.
  - Describe the metabolism of {{chemname}} or its synonyms with CAS number {{casrn}}.
    Include information on phase I and II reactions, known or predicted metabolite
    profiles, and any specific enzymes involved in its biotransformation.
  - Analyze the excretion of {{chemname}} or its synonyms with CAS number {{casrn}}.
    Describe the primary routes of excretion and the rate at which the compound is
    eliminated from the body.
  - Assess the bioaccumulation potential of {{chemname}} or its synonyms with CAS
    number {{casrn}}. Discuss its potential for accumulation in tissues and its persistence
    in the body.
  - Provide information on the half-life of {{chemname}} or its synonyms with CAS
    number {{casrn}}. Include biological half-life, effective half-life, and environmental
    half-life where applicable.
