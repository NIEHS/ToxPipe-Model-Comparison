description: Tests on agentic framework with abt-qa-assertion-prompts prompts
prompts:
  - 'Consider the following question followed by options. Answer the question from
    choosing the options. You can choose multiple options. Each option must start
    with the option number.

    {question_with_options}'
providers:
  - config:
      max_iterations: 10
      model: azure-gpt-4o
      summarize: 'false'
      temp: 0
    id: agentic
    label: Toxipe (Agentic) [GPT-4o]
  - config:
      max_iterations: 10
      model: claude-3-5-sonnet
      summarize: 'false'
      temp: 0
    id: agentic
    label: Toxipe (Agentic) [Claude-3.5 Sonnet]
  - config:
      max_iterations: 10
      model: gemini-1.5-pro
      summarize: 'false'
      temp: 0
    id: agentic
    label: Toxipe (Agentic) [Gemini 1.5 Pro]
  - config:
      max_iterations: 10
      model: mistral-large
      summarize: 'false'
      temp: 0
    id: agentic
    label: Toxipe (Agentic) [Mistral Large]
system_prompt: "You are an expert toxicologist with extensive knowledge in chemical\
  \ safety assessment, toxicokinetics, and toxicodynamics. Your expertise includes:\n\
  1. Interpreting chemical structures and properties 2. Analyzing toxicological data\
  \ from various sources (e.g., in vitro, in vivo, and in silico studies) 3. Applying\
  \ read-across and QSAR (Quantitative Structure-Activity Relationship) approaches\
  \ 4. Understanding mechanisms of toxicity and adverse outcome pathways 5. Evaluating\
  \ systemic availability based on ADME (Absorption, Distribution, Metabolism, Excretion)\
  \ properties 6. Assessing potential health hazards and risks associated with chemical\
  \ exposure\nWhen providing toxicological evaluations: - Use reliable scientific\
  \ sources and databases (e.g., PubChem, ECHA, EPA, IARC) - Consider both experimental\
  \ data and predictive models - Explain your reasoning and cite relevant studies\
  \ or guidelines - Acknowledge uncertainties and data gaps - Provide a balanced assessment,\
  \ considering both potential hazards and mitigating factors - Use a weight-of-evidence\
  \ approach when multiple data sources are available - Classify toxicodynamic activity\
  \ and systemic availability as high, medium, or low based on  the available evidence\
  \ and expert judgment - When using read-across, clearly state the basis for the\
  \ analogy and any limitations\nAdhere to ethical standards in toxicology and maintain\
  \ scientific objectivity in your assessments.\n          "
tests:
  - assert:
      - expected_phrases:
          - (C) 226 Ra and 90 Sr
        type: python
        value: file://scripts/tests.py
    description: Test similarity
    vars:
      question_with_options: '**Question**:

        Which of the following pairs of radionuclides are of concern because they
        are metabolic analogs of calcium, deposited in bone, and may cause skeletal
        neoplasia?

        **Options**:

        (A) 222 Rn and 137 Cs


        (B) 222 Rn and 90 Sr


        (C) 226 Ra and 90 Sr


        (D) 137 Cs and 90 Sr


        (E) 238 U and 238 Pu'
  - assert:
      - expected_phrases:
          - (D) atropine only
        type: python
        value: file://scripts/tests.py
    description: Test similarity
    vars:
