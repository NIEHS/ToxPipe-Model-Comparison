defaultTest: ''
description: Tests on agentic framework with basic prompts for rat
prompts:
  - What are the primary mechanisms of toxicity for {{chemname}} or its synonyms with
    CAS number {{casrn}} in rat? Please describe the molecular and cellular processes
    involved in its toxic effects.
  - 'Evaluate the potential biological effects of {{chemname}} or its synonyms with
    CAS number {{casrn}} on the following organ systems in rat: integumentary, skeletal,
    muscular, nervous, and endocrine. Provide specific impacts where known.'
  - Assess the potential biological effects of {{chemname}} or its synonyms with CAS
    number {{casrn}} on the cardiovascular, lymphatic, respiratory, digestive, and
    urinary systems in rat. Describe any known or predicted impacts.
  - Analyze the potential biological effects of {{chemname}} or its synonyms with
    CAS number {{casrn}} on the reproductive and immune systems in rat. Include any
    known or suspected impacts on fertility, fetal development, and immune function.
  - Describe the absorption characteristics of {{chemname}} or its synonyms with CAS
    number {{casrn}} in rat. Include information on potential routes of exposure,
    rate of absorption, and extent of absorption for each route.
  - Evaluate the distribution patterns of {{chemname}} or its synonyms with CAS number
    {{casrn}} in rat body. Include information on volume of distribution, tissue distribution,
    ability to cross the blood-brain barrier, and potential for placental transfer.
  - Describe the metabolism of {{chemname}} or its synonyms with CAS number {{casrn}}
    in rat. Include information on phase I and II reactions, known or predicted metabolite
    profiles, and any specific enzymes involved in its biotransformation.
  - Analyze the excretion of {{chemname}} or its synonyms with CAS number {{casrn}}
    in rat. Describe the primary routes of excretion and the rate at which the compound
    is eliminated from rat body.
  - Assess the bioaccumulation potential of {{chemname}} or its synonyms with CAS
    number {{casrn}} in rat. Discuss its potential for accumulation in tissues and
    its persistence in rat body.
  - Provide information on the half-life of {{chemname}} or its synonyms with CAS
    number {{casrn}} in rat. Include biological half-life, effective half-life, and
    environmental half-life where applicable.
providers:
  - config:
      max_iterations: 10
      model: azure-gpt-4o
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [GPT-4o]
  - config:
      max_iterations: 10
      model: claude-3-5-sonnet
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [Claude-3.5 Sonnet]
  - config:
      max_iterations: 10
      model: gemini-1.5-pro
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [Gemini 1.5 Pro]
  - config:
      max_iterations: 10
      model: mistral-large
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [Mistral Large]
