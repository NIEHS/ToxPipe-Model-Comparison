defaultTest:
  options:
    provider:
      embedding:
        id: openai:embedding:text-embedding-ada-002
description: test2
prompts:
  - 'Answer the following question with a list of string. List the {{effect_type}}
    of {{chemname}} or its synonyms with CAS number {{casrn}} on human

    '
providers:
  - config:
      temperature: 0
    id: openai:chat:azure-gpt-4o
    label: GPT-4o
  - config:
      max_iterations: 10
      model: azure-gpt-4o
      n_agents: 10
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxpipe
tests:
  - assert:
      - expected_phrases:
          - Gastrointestinal bleeding
        type: python
        value: file://scripts/tests.py
    vars:
      casrn: 50-78-2
      chemname: Aspirin
      effect_type: Sub acute toxicity
