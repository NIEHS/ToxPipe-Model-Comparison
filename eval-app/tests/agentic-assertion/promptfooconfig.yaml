defaultTest:
  options:
    provider:
      embedding:
        id: openai:embedding:text-embedding-ada-002
description: Agentic with assertion
prompts:
  - Answer the following question with a list of string. List the {{effect_type}}
    of {{chemname}} or its synonyms with CAS number {{casrn}} on human
providers:
  - config:
      max_iterations: 10
      model: azure-gpt-4o
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [GPT-4o]
  - config:
      max_iterations: 10
      model: claude-3-5-sonnet
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [Claude-3.5 Sonnet]
  - config:
      max_iterations: 10
      model: claude-3-haiku
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [Claude-3 Haiku]
  - config:
      max_iterations: 10
      model: claude-3-opus
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [Claude-3 Opus]
  - config:
      max_iterations: 10
      model: llama3-1-405b
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [Llama 3.1 405B]
  - config:
      max_iterations: 10
      model: mistral-large
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [Mistral Large]
  - config:
      max_iterations: 10
      model: mistral-7b-instruct
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [Mistral 7B Instruct]
  - config:
      max_iterations: 10
      model: cohere-command-r-plus
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [Cohere Command R+]
tests:
  - assert:
      - expected_phrases:
          - Gastrointestinal bleeding
        type: python
        value: file://scripts/tests.py
    description: Test similarity
    vars:
      casrn: 50-78-2
      chemname: Aspirin
      effect_type: Sub acute toxicity
  - assert:
      - expected_phrases:
          - Hypothermia
          - Acidosis
          - Hepatocellular/liver injury
        type: python
        value: file://scripts/tests.py
    description: Test similarity
    vars:
      casrn: 103-90-2
      chemname: Paracetamol
      effect_type: Sub acute toxicity
  - assert:
      - expected_phrases:
          - Acidosis
        type: python
        value: file://scripts/tests.py
    description: Test similarity
    vars:
      casrn: 657-24-9
      chemname: Metformin
      effect_type: Sub acute toxicity
  - assert:
      - expected_phrases:
          - Weight gain
          - Increased appetite
        type: python
        value: file://scripts/tests.py
    description: Test similarity
    vars:
      casrn: 53-03-2
      chemname: Prednisone
      effect_type: Sub acute toxicity
  - assert:
      - expected_phrases:
          - Altered liver function
        type: python
        value: file://scripts/tests.py
    description: Test similarity
    vars:
      casrn: 1746-01-6
      chemname: Dioxin
      effect_type: Sub acute toxicity
  - assert:
      - expected_phrases:
          - Fatty degeneration of the heart
        type: python
        value: file://scripts/tests.py
    description: Test similarity
    vars:
      casrn: 15502-74-6
      chemname: Arsenite
      effect_type: Sub acute toxicity
  - assert:
      - expected_phrases:
          - Loss of peripheral vision
          - Lack of coordination of movements
        type: python
        value: file://scripts/tests.py
    description: Test similarity
    vars:
      casrn: 16056-34-1
      chemname: Methylmercury
      effect_type: Sub acute toxicity
  - assert:
      - expected_phrases:
          - Dizziness
          - Fatigue
          - Drowsiness
          - Headache
          - Loss of consciousness
        type: python
        value: file://scripts/tests.py
    description: Test similarity
    vars:
      casrn: 75-01-4
      chemname: Vinylchloride
      effect_type: Sub acute toxicity
