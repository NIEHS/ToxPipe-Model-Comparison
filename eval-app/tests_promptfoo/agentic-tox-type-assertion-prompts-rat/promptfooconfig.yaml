defaultTest:
  options:
    provider:
      embedding:
        id: openai:embedding:text-embedding-ada-002
description: Tests on agentic framework with toxicity type prompts for rat
prompts:
  - Answer the following question with a list of string. List the {{effect_type}}
    of {{chemname}} or its synonyms with CAS number {{casrn}} on rat
providers:
  - config:
      max_iterations: 10
      model: azure-gpt-4o
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [GPT-4o]
  - config:
      max_iterations: 10
      model: claude-3-5-sonnet
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [Claude-3.5 Sonnet]
  - config:
      max_iterations: 10
      model: gemini-1.5-pro
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [Gemini 1.5 Pro]
  - config:
      max_iterations: 10
      model: mistral-large
      summarize: 'false'
      temp: 0
    id: file://scripts/providers.py
    label: Toxipe (Agentic) [Mistral Large]
tests:
  - assert:
      - expected_phrases:
          - Gastrointestinal bleeding
        type: python
        value: file://scripts/tests.py
    description: Test similarity
    vars:
      casrn: 50-78-2
      chemname: Aspirin
      effect_type: Sub acute toxicity
  - assert:
      - expected_phrases:
          - Angiosarcoma of the liver
        type: python
        value: file://scripts/tests.py
    description: Test similarity
    vars:
      casrn: 50-78-2
      chemname: Aspirin
      effect_type: Chronic toxicity
