    config:
      apiHost: 'toxpipe-chat.openai.azure.com'
  - id: azureopenai:chat:gpt-4-turbo-20240409
    config:
      apiHost: 'toxpipe-chat.openai.azure.com'
  - id: openai:chat:claude-3-opus

tests:
  - vars:
      language: French
      input: Hello world
  - vars:
      language: Spanish
      input: Where is the library?

defaultTest:
  options:
    provider:
      id: azureopenai:chat:gpt-4-1106-preview
      config:
        apiHost: 'toxpipe-chat.openai.azure.com'